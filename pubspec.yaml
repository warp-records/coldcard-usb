name: coldcard_usb
description: A Flutter plugin to operate a Coldcard device over USB
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  # collection: ^1.19.0
  coldcard_protocol:
    path: ../coldcard_protocol

dev_dependencies:
  # flutter_test:
  #   sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.blockshake.ledger
        pluginClass: LedgerUsbPlugin

