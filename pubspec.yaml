name: coldcard_usb
description: A Flutter plugin to operate a Coldcard device over USB
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  # collection: ^1.19.0
  coldcard_protocol:
    git:
      url: https://github.com/warp-records/coldcard-protocol
      ref: 30b7ea705fc4cf1ab0aa5c51c3483fa2b60fe4f9

dev_dependencies:
  # flutter_test:
  #   sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.cakewallet.coldcardusb
        pluginClass: LedgerUsbPlugin
